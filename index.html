    :root {
      --bg: #f5f7fa;
      --panel: #ffffff;
      --ink: #172033;
      --muted: #667085;
      --line: #d9e0e8;
      --accent: #1c6e72;
      --accent2: #2f7d52;
      --warn: #b7791f;
      --danger: #b42318;
      --soft: #eaf4f3;
      --soft2: #eff7f1;
      --shadow: 0 10px 28px rgba(23, 32, 51, 0.08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: "Segoe UI", "Microsoft YaHei", Arial, sans-serif;
      font-size: 14px;
      line-height: 1.55;
    }
    header {
      background: linear-gradient(135deg, #103f43, #1c6e72);
      color: white;
      padding: 22px clamp(16px, 3vw, 34px);
    }
    .wrap { width: min(1320px, 100%); margin: 0 auto; }
    .header-row { display: flex; justify-content: space-between; gap: 20px; align-items: flex-start; }
    h1 { margin: 0 0 6px; font-size: 27px; line-height: 1.15; }
    h2 { margin: 0 0 10px; font-size: 19px; }
    h3 { margin: 0 0 4px; font-size: 17px; }
    a { color: var(--accent); }
    button, input, textarea, select { font: inherit; }
    .subtitle { max-width: 850px; color: #dcebea; }
    .btn {
      border: 1px solid var(--line);
      background: white;
      color: var(--ink);
      border-radius: 7px;
      padding: 8px 11px;
      font-weight: 650;
      cursor: pointer;
    }
    .btn.primary { border-color: #155b5e; background: var(--accent); color: white; }
    .btn.ghost { background: rgba(255,255,255,.12); border-color: rgba(255,255,255,.32); color: white; }
    nav {
      position: sticky;
      top: 0;
      z-index: 10;
      background: white;
      border-bottom: 1px solid var(--line);
    }
    .tabs { display: flex; gap: 4px; overflow-x: auto; padding: 8px clamp(12px, 3vw, 28px); }
    .tab {
      border: 0;
      background: transparent;
      color: var(--muted);
      padding: 9px 12px;
      border-radius: 7px;
      cursor: pointer;
      white-space: nowrap;
      font-weight: 650;
    }
    .tab.active { background: var(--soft); color: #155b5e; }
    main { padding: 18px clamp(12px, 3vw, 28px) 34px; }
    .stats { display: grid; grid-template-columns: repeat(5, minmax(0, 1fr)); gap: 10px; margin-bottom: 14px; }
    .stat { background: var(--panel); border: 1px solid var(--line); border-radius: 8px; padding: 12px; box-shadow: var(--shadow); }
    .stat b { display: block; font-size: 22px; line-height: 1.1; }
    .stat span { color: var(--muted); font-size: 12px; }
    .panel { background: var(--panel); border: 1px solid var(--line); border-radius: 8px; box-shadow: var(--shadow); padding: 14px; }
    .view { display: none; }
    .view.active { display: block; }
    .toolbar { display: flex; justify-content: space-between; gap: 10px; flex-wrap: wrap; align-items: center; margin-bottom: 12px; }
    .filters { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    .filters input, .filters select { border: 1px solid var(--line); border-radius: 7px; padding: 8px 9px; background: white; min-width: 150px; }
    .grid { display: grid; grid-template-columns: minmax(0, 1fr) minmax(380px, .72fr); gap: 14px; align-items: start; }
    .candidate-list { display: grid; gap: 10px; }
    .card { border: 1px solid var(--line); border-radius: 8px; padding: 12px; background: white; cursor: pointer; }
    .card.active { border-color: var(--accent); box-shadow: inset 3px 0 0 var(--accent); }
    .card-top { display: flex; justify-content: space-between; gap: 12px; align-items: flex-start; }
    .meta { color: var(--muted); font-size: 12.5px; }
    .tags { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 8px; }
    .tag { display: inline-flex; border-radius: 999px; padding: 2px 7px; background: var(--soft); color: #155b5e; font-size: 12px; border: 1px solid #cfe4e2; }
    .tag.green { background: var(--soft2); color: var(--accent2); border-color: #d4ead8; }
    .tag.warn { background: #fff7e6; color: var(--warn); border-color: #f3dca7; }
    .tag.danger { background: #fff1f0; color: var(--danger); border-color: #ffd6d2; }
    .score { min-width: 50px; text-align: center; border-radius: 7px; background: var(--soft2); color: var(--accent2); padding: 5px 7px; font-weight: 750; }
    .brief { border-left: 4px solid var(--accent); padding: 12px; background: white; border-radius: 8px; border-top: 1px solid var(--line); border-right: 1px solid var(--line); border-bottom: 1px solid var(--line); margin-bottom: 12px; }
    .profile-grid { display: grid; grid-template-columns: minmax(0, .75fr) minmax(0, 1fr); gap: 14px; }
    .kv { display: grid; gap: 8px; }
    .kv div { border-bottom: 1px solid var(--line); padding-bottom: 7px; }
    .kv b { display: block; color: var(--muted); font-size: 12px; }
    .bullets { margin: 6px 0 0 18px; padding: 0; }
    .bullets li { margin: 3px 0; }
    .source-list { margin: 6px 0 0 18px; padding: 0; }
    textarea { width: 100%; min-height: 260px; border: 1px solid var(--line); border-radius: 7px; padding: 9px; resize: vertical; }
    .field { display: grid; gap: 5px; margin-bottom: 10px; }
    .field label { color: var(--muted); font-size: 12px; font-weight: 700; }
    .field input, .field select { width: 100%; border: 1px solid var(--line); border-radius: 7px; padding: 8px 9px; background: white; }
    .button-row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    .email-layout { display: grid; grid-template-columns: 280px minmax(0, 1fr) 360px; gap: 14px; align-items: start; }
    .email-item { border: 1px solid var(--line); border-radius: 8px; padding: 10px; cursor: pointer; background: white; }
    .email-item.active { border-color: var(--accent); background: var(--soft); }
    .ai-panel { display: grid; gap: 10px; }
    .ai-panel textarea { min-height: 96px; }
    .ai-status { min-height: 22px; color: var(--muted); font-size: 12.5px; }
    .draft-meta { display: flex; justify-content: space-between; gap: 10px; color: var(--muted); font-size: 12.5px; margin: 6px 0 10px; }
    .empty { padding: 28px 18px; text-align: center; color: var(--muted); border: 1px dashed #b8c3d1; border-radius: 8px; background: #fbfcfd; }
    @media (max-width: 980px) {
      .stats { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .grid, .profile-grid, .email-layout { grid-template-columns: 1fr; }
      .header-row { flex-direction: column; }
    }
  </style>

  <header>
    <div class="wrap header-row">

  <nav>

  <main class="wrap">

          </select>
          <select id="statusFilter" onchange="renderPipeline()"><option value="">全部状态</option></select>

  <script>
    const data = JSON.parse(document.getElementById("seed-data").textContent);
    let selectedId = data.candidates?.[0]?.id || null;
    (data.candidates || []).forEach(c => { c.email_draft_original = c.email_draft || ""; });

    function esc(v) {
      return String(v ?? "").replace(/[&<>"']/g, ch => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[ch]));
    }
    function showView(name) {
      document.querySelectorAll(".view").forEach(v => v.classList.toggle("active", v.id === name));
      document.querySelectorAll(".tab").forEach(t => t.classList.toggle("active", t.dataset.view === name));
      renderAll();
    }
    function selectCandidate(id) { selectedId = id; renderAll(); }
    function currentCandidate() { return data.candidates?.find(c => c.id === selectedId) || data.candidates?.[0]; }
    function deadlineTag(c) {
      const text = c.application_deadline || "deadline 待核对";
      const urgent = /URGENT|closes in|时间过近|2026-07-10/i.test((c.deadline_priority_notes || "") + text);
      return `<span class="tag ${urgent ? "danger" : "warn"}">${esc(text)}</span>`;
    }
    function card(c) {
      const active = c.id === selectedId ? " active" : "";
      return `<article class="card${active}" onclick="selectCandidate('${esc(c.id)}')">
        <div class="card-top">
          <div><h3>${esc(c.supervisor)}</h3><div class="meta">${esc(c.title)} · ${esc(c.university)} · ${esc(c.country)}</div></div>
          <div class="score">${esc(c.fit_score ?? "-")}</div>
        </div>
        <div class="tags">
          <span class="tag">${esc(c.region)}</span>
          <span class="tag green">Funding ${esc(c.funding_score ?? "-")}</span>
          <span class="tag">Possibility ${esc(c.possibility_score ?? "-")}</span>
          ${deadlineTag(c)}
          <span class="tag">${esc(c.status || "待筛选")}</span>
        </div>
        <div class="meta" style="margin-top:8px">${esc((c.match_relation || "").slice(0, 210))}</div>
      </article>`;
    }
    function renderStats() {
      const cs = data.candidates || [];
      const urgent = cs.filter(c => /URGENT|时间过近|2026-07-10/i.test((c.deadline_priority_notes || "") + (c.application_deadline || ""))).length;
      const highFit = cs.filter(c => Number(c.fit_score || 0) >= 80).length;
      const funded = cs.filter(c => Number(c.funding_score || 0) >= 75).length;
      const regions = new Set(cs.map(c => c.region).filter(Boolean)).size;
      const cards = [["导师总数", cs.length], ["高匹配", highFit], ["强资金线索", funded], ["近截止警报", urgent], ["覆盖地区", regions]];
      document.getElementById("stats").innerHTML = cards.map(([k,v]) => `<div class="stat"><b>${v}</b><span>${k}</span></div>`).join("");
      document.getElementById("lastUpdated").textContent = `数据更新：${data.last_updated || ""}；CV 来源：${data.profile?.cv_source || "未记录"}`;
    }
    function renderBriefs() {
      const briefs = data.daily_briefs || [];
      document.getElementById("briefList").innerHTML = briefs.length ? briefs.map(b => {
        const items = (b.candidate_ids || []).map(id => data.candidates.find(c => c.id === id)).filter(Boolean);
        return `<article class="brief"><h3>${esc(b.date)} · ${esc(b.id)}</h3><div>${esc(b.summary)}</div><div class="meta" style="margin-top:6px">${esc(b.search_notes || "")}</div><div class="candidate-list" style="margin-top:10px">${items.map(card).join("")}</div></article>`;
      }).join("") : `<div class="empty">暂无每日推送。</div>`;
    }
    function renderStatusOptions() {
      const el = document.getElementById("statusFilter");
      const old = el.value;
      const statuses = [...new Set((data.candidates || []).map(c => c.status).filter(Boolean))];
      el.innerHTML = `<option value="">全部状态</option>` + statuses.map(s => `<option>${esc(s)}</option>`).join("");
      el.value = old;
    }
    function renderPipeline() {
      renderStatusOptions();
      const q = (document.getElementById("searchBox")?.value || "").toLowerCase();
      const region = document.getElementById("regionFilter")?.value || "";
      const status = document.getElementById("statusFilter")?.value || "";
      let cs = [...(data.candidates || [])];
      if (q) cs = cs.filter(c => JSON.stringify(c).toLowerCase().includes(q));
      if (region) cs = cs.filter(c => c.region === region);
      if (status) cs = cs.filter(c => c.status === status);
      cs.sort((a,b) => Number(b.possibility_score || 0) - Number(a.possibility_score || 0));
      document.getElementById("candidateList").innerHTML = cs.length ? cs.map(card).join("") : `<div class="empty">没有符合条件的导师。</div>`;
      renderDetail();
    }
    function renderDetail() {
      const c = currentCandidate();
      const el = document.getElementById("candidateDetail");
      if (!c) { el.innerHTML = `<div class="empty">暂无候选。</div>`; return; }
      el.innerHTML = `<h2>${esc(c.supervisor)}</h2>
        <div class="meta">${esc(c.title)} · ${esc(c.university)} · ${esc(c.country)}</div>
        <div class="tags"><span class="tag">Fit ${esc(c.fit_score)}</span><span class="tag green">Funding ${esc(c.funding_score)}</span><span class="tag">Lab ${esc(c.lab_health_score)}</span>${deadlineTag(c)}</div>
        <h3 style="margin-top:14px">资金与 CSC</h3><p>${esc(c.funding)}</p><p>${esc(c.csc_fit)}</p>
        <h3>匹配关系</h3><p>${esc(c.match_relation)}</p>
        <h3>套磁切入点 / 要求</h3><p>${esc(c.requirements)}</p>
        <h3>近期产出与实验室健康</h3><p>${esc(c.recent_outputs)}</p><p>${esc(c.grants_or_lab_health)}</p>
        <h3>截止风险</h3><p>${esc(c.deadline_priority_notes || "待核对")}</p>
        <h3>来源</h3><ul class="source-list">${(c.sources || []).map(s => `<li><a href="${esc(s.url)}" target="_blank" rel="noreferrer">${esc(s.label || s.url)}</a></li>`).join("")}</ul>`;
    }
    function renderEmails() {
      document.getElementById("emailList").innerHTML = (data.candidates || []).map(c => `<div class="email-item ${c.id === selectedId ? "active" : ""}" onclick="selectCandidate('${esc(c.id)}')"><b>${esc(c.supervisor)}</b><div class="meta">${esc(c.university)}</div></div>`).join("");
      const c = currentCandidate();
      if (!c) {
        document.getElementById("emailDetail").innerHTML = `<div class="empty">暂无邮件草稿。</div>`;
        document.getElementById("aiPanel").innerHTML = `<div class="empty">请选择导师后再修订。</div>`;
        return;
      }
      const draft = getDraft(c);
      document.getElementById("emailDetail").innerHTML = `<h2>${esc(c.email_subject || "Email draft")}</h2>
        <div class="meta">${esc(c.email || "email 待核对")}</div>
        <div class="draft-meta"><span id="draftWordCount">${wordCount(draft)} words</span><span>本机编辑稿会临时保存到浏览器</span></div>
        <textarea id="emailDraftEditor" oninput="saveDraftFromEditor()">${esc(draft)}</textarea>
        <div class="button-row" style="margin-top:10px">
          <button class="btn primary" onclick="copyDraft()">复制当前稿</button>
          <button class="btn" onclick="resetDraft()">恢复系统原稿</button>
          <button class="btn" onclick="downloadCurrentDraft()">导出 TXT</button>
        </div>`;
      renderAiPanel(c);
    }
    function draftKey(id) { return `phd-email-draft:${id}`; }
    function aiKey() { return "phd-email-ai-settings"; }
    function getDraft(c) {
      const saved = sessionStorage.getItem(draftKey(c.id));
      return saved !== null ? saved : (c.email_draft || "");
    }
    function wordCount(text) {
      return (String(text || "").match(/\b[\w'-]+\b/g) || []).length;
    }
    function saveDraftFromEditor() {
      const c = currentCandidate();
      const editor = document.getElementById("emailDraftEditor");
      if (!c || !editor) return;
      c.email_draft = editor.value;
      sessionStorage.setItem(draftKey(c.id), editor.value);
      const count = document.getElementById("draftWordCount");
      if (count) count.textContent = `${wordCount(editor.value)} words`;
    }
    function setDraft(text) {
      const c = currentCandidate();
      const editor = document.getElementById("emailDraftEditor");
      if (!c || !editor) return;
      editor.value = text || "";
      saveDraftFromEditor();
    }
    async function copyDraft() {
      const editor = document.getElementById("emailDraftEditor");
      if (!editor) return;
      await navigator.clipboard.writeText(editor.value);
      setAiStatus("已复制当前邮件草稿。");
    }
    function resetDraft() {
      const c = currentCandidate();
      if (!c) return;
      sessionStorage.removeItem(draftKey(c.id));
      c.email_draft = c.email_draft_original || c.email_draft || "";
      renderEmails();
    }
    function downloadCurrentDraft() {
      const c = currentCandidate();
      const editor = document.getElementById("emailDraftEditor");
      if (!c || !editor) return;
      const blob = new Blob([editor.value], {type: "text/plain;charset=utf-8"});
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = `${c.supervisor || "email-draft"}.txt`.replace(/[\\/:*?"<>|]/g, "_");
      a.click();
      URL.revokeObjectURL(a.href);
    }
    function renderAiPanel(c) {
      const saved = JSON.parse(sessionStorage.getItem(aiKey()) || "{}");
      document.getElementById("aiPanel").innerHTML = `<div class="ai-panel">
        <h2>AI 实时修订</h2>
        <div class="field"><label>AI endpoint</label><input id="aiEndpoint" value="${esc(saved.endpoint || "http://127.0.0.1:8765/api/revise-email")}"></div>
        <div class="field"><label>OpenAI API Key（仅本次浏览器会话保存；本地 bridge 也可读取 OPENAI_API_KEY）</label><input id="aiApiKey" type="password" value="${esc(saved.apiKey || "")}" placeholder="sk-..."></div>
        <div class="field"><label>模型</label><input id="aiModel" value="${esc(saved.model || "gpt-4.1-mini")}"></div>
        <div class="field"><label>修订目标</label><select id="aiMode">
          <option value="polish">更自然、更像学术首封套磁</option>
          <option value="specific">加强与导师项目/论文连接</option>
          <option value="shorten">压缩到 180 词以内</option>
          <option value="formal">更正式克制</option>
          <option value="custom">按下面自定义指令</option>
        </select></div>
        <div class="field"><label>自定义指令</label><textarea id="aiInstruction" placeholder="例如：突出 QS/H-index 平台判断，但邮件里不要显得功利；把 RESDOC 申请问法写得更自然。"></textarea></div>
        <div class="button-row">
          <button class="btn primary" onclick="reviseWithAi()">AI 修订当前稿</button>
          <button class="btn" onclick="saveAiSettings()">保存本次设置</button>
        </div>
        <div id="aiStatus" class="ai-status"></div>
        <div class="field"><label>AI 返回稿</label><textarea id="aiResult" placeholder="AI 修订结果会出现在这里。"></textarea></div>
        <div class="button-row">
          <button class="btn primary" onclick="replaceDraftWithAiResult()">用 AI 稿替换当前稿</button>
          <button class="btn" onclick="copyAiResult()">复制 AI 稿</button>
        </div>
      </div>`;
    }
    function saveAiSettings() {
      const payload = {
        endpoint: document.getElementById("aiEndpoint")?.value || "http://127.0.0.1:8765/api/revise-email",
        apiKey: document.getElementById("aiApiKey")?.value || "",
        model: document.getElementById("aiModel")?.value || "gpt-4.1-mini",
      };
      sessionStorage.setItem(aiKey(), JSON.stringify(payload));
      setAiStatus("本次浏览器会话的 AI 设置已保存。");
    }
    function setAiStatus(text) {
      const el = document.getElementById("aiStatus");
      if (el) el.textContent = text || "";
    }
    function aiInstructionText(mode, custom) {
      const presets = {
        polish: "Revise the email so it reads like a concise, natural first-contact email to a European ecology professor. Keep it under 300 words, specific, confident, and not pushy.",
        specific: "Strengthen the connection to the supervisor's specific project, lab scale, and recent research. Keep the email under 300 words and avoid sounding generic.",
        shorten: "Compress the email to under 180 words while preserving the strongest research fit, the clear ask, and a professional tone.",
        formal: "Make the email more formal, restrained, and polished for a senior professor. Keep it under 300 words.",
        custom: custom || "Improve this first-contact PhD email while keeping it under 300 words.",
      };
      return presets[mode] || presets.polish;
    }
    async function reviseWithAi() {
      saveDraftFromEditor();
      saveAiSettings();
      const c = currentCandidate();
      const editor = document.getElementById("emailDraftEditor");
      const key = document.getElementById("aiApiKey")?.value?.trim();
      const model = document.getElementById("aiModel")?.value?.trim() || "gpt-4.1-mini";
      const endpoint = document.getElementById("aiEndpoint")?.value?.trim() || "http://127.0.0.1:8765/api/revise-email";
      const mode = document.getElementById("aiMode")?.value || "polish";
      const custom = document.getElementById("aiInstruction")?.value || "";
      if (!c || !editor) return;
      if (!key && endpoint.includes("api.openai.com")) { setAiStatus("请先填入 OpenAI API key。"); return; }
      setAiStatus("AI 正在修订，先喝口水，别急。");
      const instruction = aiInstructionText(mode, custom);
      const profile = data.profile || {};
      const prompt = `You are revising a PhD first-contact email. Return only the revised email body, no explanation.

Rules:
- English only.
- Under 300 words unless the user asks for shorter.
- Do not mention weak points.
- Keep a specific connection to the supervisor's research.
- Include one clear, polite ask.
- Mention Qiongjie Huang's Aquatic Sciences first-author paper or Ecology Letters under-review manuscript when useful.
- Use only the facts provided below. Do not invent supervisor projects, papers, funding, rankings, deadlines, or prior relationships. If a detail is uncertain, phrase it cautiously or omit it.

Candidate:
Supervisor: ${c.supervisor}
University: ${c.university}
Title: ${c.title}
Research directions: ${c.research_directions}
Match relation: ${c.match_relation}
Funding/route notes: ${c.funding}
QS/H-index/team priority notes: ${c.ranking_basis || ""} H-index: ${c.h_index || "unknown"}. Team/project scale: ${c.team_project_scale || ""}
Sources available to the system: ${(c.sources || []).map(s => `${s.label}: ${s.url}`).join(" | ")}

Applicant profile:
${profile.core_direction_en || ""}
Papers: ${(profile.highlight_papers || []).slice(0, 3).join(" | ")}
Methods: ${(profile.methods || []).join(", ")}
Research experience: ${(profile.research_experience || []).slice(0, 3).join(" | ")}

User revision instruction:
${instruction}

Current email:
${editor.value}`;
      try {
        const isLocalBridge = endpoint.includes("/api/revise-email");
        const res = await fetch(endpoint, {
          method: "POST",
          headers: isLocalBridge ? {
            "Content-Type": "application/json",
          } : {
            "Content-Type": "application/json",
            "Authorization": `Bearer ${key}`,
          },
          body: isLocalBridge ? JSON.stringify({
            apiKey: key,
            model,
            prompt,
          }) : JSON.stringify({
            model,
            input: prompt,
          }),
        });
        const json = await res.json();
        if (!res.ok) throw new Error(json.error?.message || `HTTP ${res.status}`);
        const text = json.text || json.output_text || (json.output || []).flatMap(item => item.content || []).map(part => part.text || "").join("\n").trim();
        document.getElementById("aiResult").value = text;
        setAiStatus(`AI 修订完成，约 ${wordCount(text)} words。`);
      } catch (err) {
        setAiStatus(`AI 调用失败：${err.message}`);
      }
    }
    function replaceDraftWithAiResult() {
      const text = document.getElementById("aiResult")?.value || "";
      if (!text.trim()) { setAiStatus("AI 返回稿为空，不能替换。"); return; }
      setDraft(text);
      setAiStatus("已用 AI 返回稿替换当前草稿，并保存在本次浏览器会话。");
    }
    async function copyAiResult() {
      const text = document.getElementById("aiResult")?.value || "";
      await navigator.clipboard.writeText(text);
      setAiStatus("已复制 AI 返回稿。");
    }
    function renderProfile() {
      const p = data.profile || {};
      document.getElementById("profilePanel").innerHTML = `<h2>最新 CV 画像</h2><div class="kv">
        <div><b>姓名</b>${esc(p.name)} / ${esc(p.chinese_name)}</div>
        <div><b>硕士</b>${esc(p.degree)}<br>${esc(p.period)}；GPA ${esc(p.master_gpa)}</div>
        <div><b>目标</b>${esc(p.target)}</div>
        <div><b>核心方向</b>${esc(p.core_direction_en)}</div>
        <div><b>方法关键词</b>${esc((p.methods || []).join(", "))}</div>
        <div><b>语言</b>${esc(p.languages)}</div>
      </div><h3 style="margin-top:14px">论文</h3><ul class="bullets">${(p.highlight_papers || []).map(x => `<li>${esc(x)}</li>`).join("")}</ul>
      <h3 style="margin-top:14px">研究经历</h3><ul class="bullets">${(p.research_experience || []).map(x => `<li>${esc(x)}</li>`).join("")}</ul>`;
      const sp = data.search_policy || {};
      document.getElementById("policyPanel").innerHTML = `<h2>每日检索规则</h2><div class="kv">
        <div><b>入学时间</b>${esc(sp.entry_timing)}</div>
        <div><b>截止日期策略</b>${esc(sp.deadline_policy)}</div>
        <div><b>资金策略</b>${esc(sp.funding_policy)}</div>
        <div><b>地区规则</b>${esc(sp.region_rule)}</div>
      </div><h3 style="margin-top:14px">Must-have</h3><ul class="bullets">${(sp.must_have || []).map(x => `<li>${esc(x)}</li>`).join("")}</ul>
      <h3 style="margin-top:14px">Exclude</h3><ul class="bullets">${(sp.exclude || []).map(x => `<li>${esc(x)}</li>`).join("")}</ul>`;
    }
    function exportData() {
      const blob = new Blob([JSON.stringify(data, null, 2)], {type: "application/json"});
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = `phd-outreach-data-${data.last_updated || "export"}.json`;
      a.click();
      URL.revokeObjectURL(a.href);
    }
    function renderAll() { renderStats(); renderBriefs(); renderPipeline(); renderEmails(); renderProfile(); }
    renderAll();
  </script>
</body>
</html>
