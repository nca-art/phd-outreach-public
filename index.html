      border: 0;

      white-space: nowrap;
      font-weight: 650;

    main { padding: 18px clamp(12px, 3vw, 28px) 34px; }
    .stats { display: grid; grid-template-columns: repeat(5, minmax(0, 1fr)); gap: 10px; margin-bottom: 14px; }
    .stat { background: var(--panel); border: 1px solid var(--line); border-radius: 8px; padding: 12px; box-shadow: var(--shadow); }
    .stat b { display: block; font-size: 22px; line-height: 1.1; }
    .stat span { color: var(--muted); font-size: 12px; }
    .panel { background: var(--panel); border: 1px solid var(--line); border-radius: 8px; box-shadow: var(--shadow); padding: 14px; }
    .view { display: none; }
    .view.active { display: block; }
    .toolbar { display: flex; justify-content: space-between; gap: 10px; flex-wrap: wrap; align-items: center; margin-bottom: 12px; }
    .filters { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    .filters input, .filters select { border: 1px solid var(--line); border-radius: 7px; padding: 8px 9px; background: white; min-width: 150px; }
    .grid { display: grid; grid-template-columns: minmax(0, 1fr) minmax(380px, .72fr); gap: 14px; align-items: start; }
    .candidate-list { display: grid; gap: 10px; }
    .card { border: 1px solid var(--line); border-radius: 8px; padding: 12px; background: white; cursor: pointer; }
    .card.active { border-color: var(--accent); box-shadow: inset 3px 0 0 var(--accent); }
    .card-top { display: flex; justify-content: space-between; gap: 12px; align-items: flex-start; }
    .meta { color: var(--muted); font-size: 12.5px; }
    .tags { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 8px; }
    .tag { display: inline-flex; border-radius: 999px; padding: 2px 7px; background: var(--soft); color: #155b5e; font-size: 12px; border: 1px solid #cfe4e2; }
    .tag.green { background: var(--soft2); color: var(--accent2); border-color: #d4ead8; }
    .tag.warn { background: #fff7e6; color: var(--warn); border-color: #f3dca7; }
    .tag.danger { background: #fff1f0; color: var(--danger); border-color: #ffd6d2; }
    .score { min-width: 50px; text-align: center; border-radius: 7px; background: var(--soft2); color: var(--accent2); padding: 5px 7px; font-weight: 750; }
    .brief { border-left: 4px solid var(--accent); padding: 12px; background: white; border-radius: 8px; border-top: 1px solid var(--line); border-right: 1px solid var(--line); border-bottom: 1px solid var(--line); margin-bottom: 12px; }
    .profile-grid { display: grid; grid-template-columns: minmax(0, .75fr) minmax(0, 1fr); gap: 14px; }
    .kv { display: grid; gap: 8px; }
    .kv div { border-bottom: 1px solid var(--line); padding-bottom: 7px; }
    .kv b { display: block; color: var(--muted); font-size: 12px; }
    .bullets { margin: 6px 0 0 18px; padding: 0; }
    .bullets li { margin: 3px 0; }
    .source-list { margin: 6px 0 0 18px; padding: 0; }
    textarea { width: 100%; min-height: 260px; border: 1px solid var(--line); border-radius: 7px; padding: 9px; resize: vertical; }
    .email-layout { display: grid; grid-template-columns: 320px 1fr; gap: 14px; align-items: start; }
    .email-item { border: 1px solid var(--line); border-radius: 8px; padding: 10px; cursor: pointer; background: white; }
    .email-item.active { border-color: var(--accent); background: var(--soft); }
    .empty { padding: 28px 18px; text-align: center; color: var(--muted); border: 1px dashed #b8c3d1; border-radius: 8px; background: #fbfcfd; }
    @media (max-width: 980px) {
      .stats { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .grid, .profile-grid, .email-layout { grid-template-columns: 1fr; }

  <header>
    <div class="wrap header-row">
      <div>
        <h1>PhD 导师与全奖机会管理系统</h1>
        <div class="subtitle">基于黄琼杰最新 CV，跟踪欧洲、亚洲、南美的淡水多重胁迫、底栖动物、生物多样性、功能性状、eDNA 与生态建模方向导师。每日推送会写入本地 JSON 并重建此 HTML。</div>
      </div>
      <div><button class="btn ghost" onclick="exportData()">导出 JSON</button></div>
    </div>
  </header>
  <nav>
    <div class="wrap tabs">
      <button class="tab active" data-view="dashboard" onclick="showView('dashboard')">每日推送</button>
      <button class="tab" data-view="pipeline" onclick="showView('pipeline')">导师库</button>
      <button class="tab" data-view="emails" onclick="showView('emails')">邮件草稿</button>
      <button class="tab" data-view="profile" onclick="showView('profile')">CV 画像与规则</button>
    </div>
  </nav>
  <main class="wrap">
    <section class="stats" id="stats"></section>
    <section id="dashboard" class="view active">
      <div class="toolbar">
        <div><h2>每日 brief</h2><div class="meta" id="lastUpdated"></div></div>
        <div class="filters"><button class="btn" onclick="window.print()">打印 / 保存 PDF</button></div>
      </div>
      <div id="briefList"></div>
    </section>
    <section id="pipeline" class="view">
      <div class="toolbar">
        <div class="filters">
          <input id="searchBox" placeholder="搜索导师/学校/方向" oninput="renderPipeline()">
          <select id="regionFilter" onchange="renderPipeline()">
            <option value="">全部地区</option><option>Europe</option><option>Asia</option><option>South America</option>
          </select>
          <select id="statusFilter" onchange="renderPipeline()"><option value="">全部状态</option></select>
        </div>
      </div>
      <div class="grid"><div class="candidate-list" id="candidateList"></div><div class="panel" id="candidateDetail"></div></div>
    </section>
    <section id="emails" class="view">
      <div class="email-layout"><div class="panel"><h2>选择导师</h2><div class="candidate-list" id="emailList"></div></div><div class="panel" id="emailDetail"></div></div>
    </section>
    <section id="profile" class="view">
      <div class="profile-grid"><div class="panel" id="profilePanel"></div><div class="panel" id="policyPanel"></div></div>
    </section>
  </main>
  <script>
    const data = JSON.parse(document.getElementById("seed-data").textContent);
    let selectedId = data.candidates?.[0]?.id || null;

    function esc(v) {
      return String(v ?? "").replace(/[&<>"']/g, ch => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[ch]));
    }
    function showView(name) {
      document.querySelectorAll(".view").forEach(v => v.classList.toggle("active", v.id === name));
      document.querySelectorAll(".tab").forEach(t => t.classList.toggle("active", t.dataset.view === name));
      renderAll();
    }
    function selectCandidate(id) { selectedId = id; renderAll(); }
    function currentCandidate() { return data.candidates?.find(c => c.id === selectedId) || data.candidates?.[0]; }
    function deadlineTag(c) {
      const text = c.application_deadline || "deadline 待核对";
      const urgent = /URGENT|closes in|时间过近|2026-07-10/i.test((c.deadline_priority_notes || "") + text);
      return `<span class="tag ${urgent ? "danger" : "warn"}">${esc(text)}</span>`;
    }
    function card(c) {
      const active = c.id === selectedId ? " active" : "";
      return `<article class="card${active}" onclick="selectCandidate('${esc(c.id)}')">
        <div class="card-top">
          <div><h3>${esc(c.supervisor)}</h3><div class="meta">${esc(c.title)} · ${esc(c.university)} · ${esc(c.country)}</div></div>
          <div class="score">${esc(c.fit_score ?? "-")}</div>
        </div>
        <div class="tags">
          <span class="tag">${esc(c.region)}</span>
          <span class="tag green">Funding ${esc(c.funding_score ?? "-")}</span>
          <span class="tag">Possibility ${esc(c.possibility_score ?? "-")}</span>
          ${deadlineTag(c)}
          <span class="tag">${esc(c.status || "待筛选")}</span>
        </div>
        <div class="meta" style="margin-top:8px">${esc((c.match_relation || "").slice(0, 210))}</div>
      </article>`;
    }
    function renderStats() {
      const cs = data.candidates || [];
      const urgent = cs.filter(c => /URGENT|时间过近|2026-07-10/i.test((c.deadline_priority_notes || "") + (c.application_deadline || ""))).length;
      const highFit = cs.filter(c => Number(c.fit_score || 0) >= 80).length;
      const funded = cs.filter(c => Number(c.funding_score || 0) >= 75).length;
      const regions = new Set(cs.map(c => c.region).filter(Boolean)).size;
      const cards = [["导师总数", cs.length], ["高匹配", highFit], ["强资金线索", funded], ["近截止警报", urgent], ["覆盖地区", regions]];
      document.getElementById("stats").innerHTML = cards.map(([k,v]) => `<div class="stat"><b>${v}</b><span>${k}</span></div>`).join("");
      document.getElementById("lastUpdated").textContent = `数据更新：${data.last_updated || ""}；CV 来源：${data.profile?.cv_source || "未记录"}`;
    }
    function renderBriefs() {
      const briefs = data.daily_briefs || [];
      document.getElementById("briefList").innerHTML = briefs.length ? briefs.map(b => {
        const items = (b.candidate_ids || []).map(id => data.candidates.find(c => c.id === id)).filter(Boolean);
        return `<article class="brief"><h3>${esc(b.date)} · ${esc(b.id)}</h3><div>${esc(b.summary)}</div><div class="meta" style="margin-top:6px">${esc(b.search_notes || "")}</div><div class="candidate-list" style="margin-top:10px">${items.map(card).join("")}</div></article>`;
      }).join("") : `<div class="empty">暂无每日推送。</div>`;
    }
    function renderStatusOptions() {
      const el = document.getElementById("statusFilter");
      const old = el.value;
      const statuses = [...new Set((data.candidates || []).map(c => c.status).filter(Boolean))];
      el.innerHTML = `<option value="">全部状态</option>` + statuses.map(s => `<option>${esc(s)}</option>`).join("");
      el.value = old;
    }
    function renderPipeline() {
      renderStatusOptions();
      const q = (document.getElementById("searchBox")?.value || "").toLowerCase();
      const region = document.getElementById("regionFilter")?.value || "";
      const status = document.getElementById("statusFilter")?.value || "";
      let cs = [...(data.candidates || [])];
      if (q) cs = cs.filter(c => JSON.stringify(c).toLowerCase().includes(q));
      if (region) cs = cs.filter(c => c.region === region);
      if (status) cs = cs.filter(c => c.status === status);
      cs.sort((a,b) => Number(b.possibility_score || 0) - Number(a.possibility_score || 0));
      document.getElementById("candidateList").innerHTML = cs.length ? cs.map(card).join("") : `<div class="empty">没有符合条件的导师。</div>`;
      renderDetail();
    }
    function renderDetail() {
      const c = currentCandidate();
      const el = document.getElementById("candidateDetail");
      if (!c) { el.innerHTML = `<div class="empty">暂无候选。</div>`; return; }
      el.innerHTML = `<h2>${esc(c.supervisor)}</h2>
        <div class="meta">${esc(c.title)} · ${esc(c.university)} · ${esc(c.country)}</div>
        <div class="tags"><span class="tag">Fit ${esc(c.fit_score)}</span><span class="tag green">Funding ${esc(c.funding_score)}</span><span class="tag">Lab ${esc(c.lab_health_score)}</span>${deadlineTag(c)}</div>
        <h3 style="margin-top:14px">资金与 CSC</h3><p>${esc(c.funding)}</p><p>${esc(c.csc_fit)}</p>
        <h3>匹配关系</h3><p>${esc(c.match_relation)}</p>
        <h3>套磁切入点 / 要求</h3><p>${esc(c.requirements)}</p>
        <h3>近期产出与实验室健康</h3><p>${esc(c.recent_outputs)}</p><p>${esc(c.grants_or_lab_health)}</p>
        <h3>截止风险</h3><p>${esc(c.deadline_priority_notes || "待核对")}</p>
        <h3>来源</h3><ul class="source-list">${(c.sources || []).map(s => `<li><a href="${esc(s.url)}" target="_blank" rel="noreferrer">${esc(s.label || s.url)}</a></li>`).join("")}</ul>`;
    }
    function renderEmails() {
      document.getElementById("emailList").innerHTML = (data.candidates || []).map(c => `<div class="email-item ${c.id === selectedId ? "active" : ""}" onclick="selectCandidate('${esc(c.id)}')"><b>${esc(c.supervisor)}</b><div class="meta">${esc(c.university)}</div></div>`).join("");
      const c = currentCandidate();
      document.getElementById("emailDetail").innerHTML = c ? `<h2>${esc(c.email_subject || "Email draft")}</h2><div class="meta">${esc(c.email || "email 待核对")}</div><textarea readonly>${esc(c.email_draft || "")}</textarea>` : `<div class="empty">暂无邮件草稿。</div>`;
    }
    function renderProfile() {
      const p = data.profile || {};
      document.getElementById("profilePanel").innerHTML = `<h2>最新 CV 画像</h2><div class="kv">
        <div><b>姓名</b>${esc(p.name)} / ${esc(p.chinese_name)}</div>
        <div><b>硕士</b>${esc(p.degree)}<br>${esc(p.period)}；GPA ${esc(p.master_gpa)}</div>
        <div><b>目标</b>${esc(p.target)}</div>
        <div><b>核心方向</b>${esc(p.core_direction_en)}</div>
        <div><b>方法关键词</b>${esc((p.methods || []).join(", "))}</div>
        <div><b>语言</b>${esc(p.languages)}</div>
      </div><h3 style="margin-top:14px">论文</h3><ul class="bullets">${(p.highlight_papers || []).map(x => `<li>${esc(x)}</li>`).join("")}</ul>
      <h3 style="margin-top:14px">研究经历</h3><ul class="bullets">${(p.research_experience || []).map(x => `<li>${esc(x)}</li>`).join("")}</ul>`;
      const sp = data.search_policy || {};
      document.getElementById("policyPanel").innerHTML = `<h2>每日检索规则</h2><div class="kv">
        <div><b>入学时间</b>${esc(sp.entry_timing)}</div>
        <div><b>截止日期策略</b>${esc(sp.deadline_policy)}</div>
        <div><b>资金策略</b>${esc(sp.funding_policy)}</div>
        <div><b>地区规则</b>${esc(sp.region_rule)}</div>
      </div><h3 style="margin-top:14px">Must-have</h3><ul class="bullets">${(sp.must_have || []).map(x => `<li>${esc(x)}</li>`).join("")}</ul>
      <h3 style="margin-top:14px">Exclude</h3><ul class="bullets">${(sp.exclude || []).map(x => `<li>${esc(x)}</li>`).join("")}</ul>`;
    }
    function exportData() {
      const blob = new Blob([JSON.stringify(data, null, 2)], {type: "application/json"});
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = `phd-outreach-data-${data.last_updated || "export"}.json`;
      a.click();
      URL.revokeObjectURL(a.href);
    }
    function renderAll() { renderStats(); renderBriefs(); renderPipeline(); renderEmails(); renderProfile(); }
    renderAll();
  </script>
</body>
</html>
